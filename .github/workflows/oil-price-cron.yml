name: Oil Price Monitor

on:
  schedule:
    - cron: "2/15 * * * *"
  workflow_dispatch:

jobs:
  check-oil-price:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run oil price monitor
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          OIL_PRICE_THRESHOLD: ${{ vars.OIL_PRICE_THRESHOLD }}
        run: python oil_price_monitor.py
